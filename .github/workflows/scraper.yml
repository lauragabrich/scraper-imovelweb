name: Scraper ImovelWeb

on:
  schedule:
    - cron: '15 */6 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Limite (vazio = sem limite)'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    concurrency:
      group: scraper-imovelweb
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt

      - name: Rodar scraper
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: |
          LIMIT="${{ github.event.inputs.limit }}"
          CMD="python main.py"
          if [ -n "$LIMIT" ]; then
            CMD="$CMD --limit $LIMIT"
          fi
          echo "Executando: $CMD"
          $CMD
